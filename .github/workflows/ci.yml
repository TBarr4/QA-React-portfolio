name: CI Build and Cypress

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Build plus Cypress API and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            qa/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install QA dependencies
        working-directory: qa
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Typecheck QA
        working-directory: qa
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start mock API
        working-directory: qa
        run: |
          npm run mock:api > /tmp/mock-api.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4000/health > /dev/null; then
              echo "Mock API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Mock API failed to start"
          cat /tmp/mock-api.log
          exit 1

      - name: Start frontend app
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:4000
        run: |
          npm run dev -- --host 0.0.0.0 --port 3000 > /tmp/frontend.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start"
          cat /tmp/frontend.log
          exit 1

      - name: Run Cypress API tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_apiBaseUrl: http://127.0.0.1:4000
          VITE_API_BASE_URL: http://127.0.0.1:4000
        with:
          install: false
          working-directory: qa
          command: npm run cy:run:api:ci

      - name: Run Cypress E2E tests
        if: ${{ env.CYPRESS_RECORD_KEY == '' }}
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_apiBaseUrl: http://127.0.0.1:4000
          VITE_API_BASE_URL: http://127.0.0.1:4000
        with:
          install: false
          working-directory: qa
          command: npm run cy:run:e2e

      - name: Run Cypress E2E tests (recorded)
        if: ${{ env.CYPRESS_RECORD_KEY != '' }}
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_apiBaseUrl: http://127.0.0.1:4000
          VITE_API_BASE_URL: http://127.0.0.1:4000
        with:
          install: false
          working-directory: qa
          command: npm run cy:run:e2e:record

      - name: Generate Mochawesome report
        if: always()
        working-directory: qa
        run: npm run report

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            qa/cypress/results
            qa/cypress/reports
            qa/cypress/screenshots
            qa/cypress/videos
          retention-days: 14

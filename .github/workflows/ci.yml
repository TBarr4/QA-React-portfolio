name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  api-tests:
    name: API Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qa/package-lock.json

      - name: Install QA dependencies
        working-directory: qa
        run: npm ci

      - name: Run API contract tests
        working-directory: qa
        run: npx cypress run --spec 'cypress/api/**/*.cy.ts'

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: qa/cypress/results
          retention-days: 5

  e2e-tests:
    name: E2E UI Tests
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install frontend dependencies (for preview server)
        working-directory: frontend
        run: npm ci

      - name: Install QA dependencies
        working-directory: qa
        run: npm ci

      - name: Start frontend preview & run Cypress
        working-directory: qa
        run: |
          cd ../frontend && npx vite preview --port 3000 &
          sleep 5
          npx cypress run --spec 'cypress/e2e/**/*.cy.ts'

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            qa/cypress/results
            qa/cypress/screenshots
            qa/cypress/videos
          retention-days: 5

  generate-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install QA dependencies
        working-directory: qa
        run: npm ci

      - name: Download API test results
        uses: actions/download-artifact@v4
        with:
          name: api-test-results
          path: qa/cypress/results
        continue-on-error: true

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: qa/cypress/results
        continue-on-error: true

      - name: Merge and generate Mochawesome report
        working-directory: qa
        run: npm run report
        continue-on-error: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: qa/cypress/reports
          retention-days: 30

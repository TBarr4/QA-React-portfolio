name: CI Build and Cypress

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Build plus Cypress API and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            qa/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install QA dependencies
        working-directory: qa
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Typecheck QA
        working-directory: qa
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Cypress API tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          working-directory: qa
          command: npm run cy:run:api
          browser: chrome

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          working-directory: qa
          start: npm --prefix ../frontend run dev -- --host 0.0.0.0 --port 3000
          wait-on: http://127.0.0.1:3000
          wait-on-timeout: 120
          command: npm run cy:run:e2e
          browser: chrome

      - name: Generate Mochawesome report
        if: always()
        working-directory: qa
        run: npm run report

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            qa/cypress/results
            qa/cypress/reports
            qa/cypress/screenshots
            qa/cypress/videos
          retention-days: 14
